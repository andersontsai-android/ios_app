<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零股換算器_20260506</title>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #1a73e8; --bg-color: #f1f3f4; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: var(--primary-color); text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        
        .quick-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
        .amt-btn { padding: 8px 5px; font-size: 13px; background: #eee; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; color: #444; }
        .amt-btn:active { background: #d0d0d0; transform: scale(0.95); }

        .main-btn { width: 100%; padding: 16px; background-color: var(--accent-color); color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        
        #result { margin-top: 25px; padding: 20px; background-color: #fff; border-radius: 15px; display: none; border: 1px solid #e8eaed; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 16px; }
        .highlight { font-weight: 800; color: #d93025; font-size: 1.5em; }
        .loading { text-align: center; color: var(--accent-color); display: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📈 零股換算器</h2>
    
    <div class="input-group">
        <label>股票代號 (上市/上櫃皆可)</label>
        <input type="text" id="stockSymbol" placeholder="例如: 2330 或 8299">
    </div>

    <div class="input-group">
        <label>欲投入金額</label>
        <input type="number" id="budget" placeholder="請輸入金額">
        <div class="quick-amounts">
            <button class="amt-btn" onclick="setAmount(5000)">5000</button>
            <button class="amt-btn" onclick="setAmount(10000)">1萬</button>
            <button class="amt-btn" onclick="setAmount(20000)">2萬</button>
            <button class="amt-btn" onclick="setAmount(50000)">5萬</button>
        </div>
    </div>

    <button class="main-btn" onclick="fetchStockData()">開始計算</button>
    <div id="loading" class="loading">正在搜尋數據...</div>

    <div id="result">
        <div class="result-item">
            <span style="color:#777">代號/名稱</span>
            <span id="displaySymbol" style="font-weight:600; color:#1a73e8;">-</span>
        </div>
        <div class="result-item">
            <span style="color:#777">目前股價</span>
            <span id="displayPrice" style="font-weight:600">-</span>
        </div>
        <div class="result-item" style="border:none; margin-top:10px;">
            <span style="color:#777">可買零股</span>
            <span id="displayShares" class="highlight">0 股</span>
        </div>
    </div>
</div>

<script>
    function setAmount(val) {
        document.getElementById('budget').value = val;
    }

    // 改用 AllOrigins 作為 Proxy，並增加超時防護
    async function getYahooPrice(symbol) {
        try {
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m&range=1d`;
            // AllOrigins 是一個更穩定、對企業防火牆容忍度較高的轉接服務
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
            
            const response = await fetch(proxyUrl);
            if (!response.ok) return null;
            
            const rawData = await response.json();
            
            // AllOrigins 會把目標網頁的內容包在 contents 屬性裡，需要解析一次
            if (rawData && rawData.contents) {
                const parsedData = JSON.parse(rawData.contents);
                if (parsedData.chart && parsedData.chart.result) {
                    return parsedData.chart.result[0].meta.regularMarketPrice;
                }
            }
            return null;
        } catch (e) {
            console.error("連線錯誤:", e);
            return null;
        }
    }

    async function fetchStockData() {
        let inputSymbol = document.getElementById('stockSymbol').value.trim().toUpperCase();
        const budget = parseFloat(document.getElementById('budget').value);
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');

        if (!inputSymbol || !budget) {
            alert('請填寫代號與金額');
            return;
        }

        loading.style.display = 'block';
        resultDiv.style.display = 'none';

        let price = null;
        let finalSymbol = inputSymbol;

        try {
            if (/^\d+$/.test(inputSymbol)) {
                // 先嘗試上市 (.TW)
                price = await getYahooPrice(inputSymbol + ".TW");
                finalSymbol = inputSymbol + ".TW";
                
                // 如果查不到，改嘗試上櫃 (.TWO)
                if (!price) {
                    price = await getYahooPrice(inputSymbol + ".TWO");
                    finalSymbol = inputSymbol + ".TWO";
                }
            } else {
                price = await getYahooPrice(inputSymbol);
            }

            if (price) {
                const shares = (budget / price).toFixed(1);
                const nameMap = {
                    "2330.TW": "台積電 (2330)",
                    "2454.TW": "聯發科 (2454)",
                    "8299.TWO": "群聯 (8299)",
                    "2317.TW": "鴻海 (2317)"
                };

                const displayName = nameMap[finalSymbol] || finalSymbol;

                document.getElementById('displaySymbol').innerText = displayName;
                document.getElementById('displayPrice').innerText = `$${price.toLocaleString()}`;
                document.getElementById('displayShares').innerText = `${shares.toLocaleString()} 股`;
                
                resultDiv.style.display = 'block';
            } else {
                alert(`查詢失敗！\n1. 請確認代號正確\n2. 可能是 Proxy 伺服器忙碌\n3. 如果您使用公司 Wi-Fi，建議切換至 5G 網路再試。`);
            }
        } finally {
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
