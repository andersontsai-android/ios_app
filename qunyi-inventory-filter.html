<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群益庫存 篩選系統</title>
    <style>
        :root {
            --primary-color: #0984e3; /* Ocean Blue */
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2f3640;
            --accent-color: #74b9ff;
            --border-color: #dcdde1;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        /* Tabs Styling */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            color: #7f8c8d;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            background-color: rgba(9, 132, 227, 0.05);
        }

        /* Filter Section */
        .filter-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .filter-row {
            display: none;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.3s ease-in;
        }

        .filter-row.active {
            display: flex;
        }

        .extra-filters {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            outline: none;
            min-width: 220px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #34495e;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Table Styling with Sticky Column */
        .table-container {
            overflow-x: auto;
            position: relative;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: separate; /* Required for sticky border spacing */
            border-spacing: 0;
            font-size: 0.95rem;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-align: left;
            padding: 12px;
            white-space: nowrap;
            cursor: pointer;
            position: relative;
            user-select: none;
            border-bottom: 2px solid #0873c4;
        }

        th:hover {
            background-color: #0873c4;
        }

        th.sort-asc::after { content: " ▲"; font-size: 0.7rem; }
        th.sort-desc::after { content: " ▼"; font-size: 0.7rem; }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
            background-color: #fff; /* Ensure bg is solid for sticky overlap */
        }

        tr:hover td {
            background-color: #f1f2f6;
        }

        /* Sticky Column B (First Column) Logic */
        th:first-child, td:first-child {
            position: sticky;
            left: 0;
            z-index: 10;
            min-width: 120px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05); /* Subtle vertical shadow */
        }

        th:first-child {
            z-index: 11;
            background-color: var(--primary-color);
        }

        /* Ensure row hover effect works with sticky cell */
        tr:hover td:first-child {
            background-color: #f1f2f6;
        }

        .positive { color: #e74c3c; font-weight: bold; }
        .negative { color: #2ecc71; font-weight: bold; }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #95a5a6;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .filter-container { flex-direction: column; }
            .extra-filters { flex-direction: column; align-items: flex-start; }
            th:first-child, td:first-child {
                border-right: 2px solid var(--border-color); /* Stronger border on mobile */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>群益庫存 篩選系統</h1>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">試算報酬率 (%)</div>
        <div class="tab" onclick="switchTab(1)">損益 (元)</div>
        <div class="tab" onclick="switchTab(2)">付出成本 (元)</div>
    </div>

    <div class="filter-container">
        <!-- Filter 1: ROI -->
        <div id="filter-roi" class="filter-row active">
            <label>報酬率篩選：</label>
            <select id="select-roi" onchange="applyFilter()">
                <option value="all">-- 全部 --</option>
                <option value=">10">> 10%</option>
                <option value=">20">> 20%</option>
                <option value=">30">> 30%</option>
                <option value=">50">> 50%</option>
                <option value=">100">> 100%</option>
                <option value="<-15">< -15%</option>
                <option value="<-20">< -20%</option>
                <option value="<-25">< -25%</option>
                <option value="<-30">< -30%</option>
                <option value="<-50">< -50%</option>
                <option value="<-100">< -100%</option>
            </select>
        </div>

        <!-- Filter 2: P/L -->
        <div id="filter-pl" class="filter-row">
            <label>損益篩選：</label>
            <select id="select-pl" onchange="applyFilter()">
                <option value="all">-- 全部 --</option>
                <option value=">1000">> 1000</option>
                <option value=">2000">> 2000</option>
                <option value=">2500">> 2500</option>
                <option value=">5000">> 5000</option>
                <option value=">7500">> 7500</option>
                <option value=">10000">> 10000</option>
                <option value="<-2500">< -2500</option>
                <option value="<-5000">< -5000</option>
                <option value="<-10000">< -10000</option>
                <option value="<-20000">< -20000</option>
                <option value="<-25000">< -25000</option>
                <option value="<-50000">< -50000</option>
            </select>
        </div>

        <!-- Filter 3: Cost -->
        <div id="filter-cost" class="filter-row">
            <label>成本篩選：</label>
            <select id="select-cost" onchange="applyFilter()">
                <option value="all">-- 全部 --</option>
                <option value="<4000">< 4000</option>
                <option value="<=5000"><= 5000</option>
                <option value=">5000">> 5000</option>
                <option value=">7500">> 7500</option>
                <option value=">10000">> 10000</option>
                <option value=">15000">> 15000</option>
                <option value=">17500">> 17500</option>
                <option value=">20000">> 20000</option>
                <option value=">25000">> 25000</option>
                <option value=">30000">> 30000</option>
                <option value=">50000">> 50000</option>
            </select>
        </div>

        <div class="extra-filters">
            <label class="checkbox-group">
                <input type="checkbox" id="filter-etf" onchange="applyFilter()"> 過濾 ETF (名稱 00 開頭)
            </label>
        </div>
    </div>

    <div class="table-container">
        <table id="inventory-table">
            <thead>
                <tr>
                    <th onclick="sortData(0)">股票名稱 (B)</th>
                    <th onclick="sortData(1)">股數 (E)</th>
                    <th onclick="sortData(2)">付出成本 (F)</th>
                    <th onclick="sortData(3)">均價 (G)</th>
                    <th onclick="sortData(4)">市價 (I)</th>
                    <th onclick="sortData(5)">漲跌 (J)</th>
                    <th onclick="sortData(6)">市值 (K)</th>
                    <th onclick="sortData(7)">淨值 (L)</th>
                    <th onclick="sortData(8)">損益 (M)</th>
                    <th onclick="sortData(9)">報酬率 (N)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Data injected here -->
            </tbody>
        </table>
        <div id="status" class="loading">正在連線至 Google Sheet...</div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Bl9SRtxSp2StQH99wPLn8TyfvSYRlyHu6-tIS2F_UHg/gviz/tq?tqx=out:csv&sheet=%E7%BE%A4%E7%9B%8A%E5%BA%AB%E5%AD%98';
    let rawData = [];
    let currentTabIndex = 0;
    let sortConfig = { column: null, direction: 'asc' };

    const displayIndices = [1, 4, 5, 6, 8, 9, 10, 11, 12, 13];

    window.onload = init;

    async function init() {
        try {
            const response = await fetch(SHEET_URL);
            if (!response.ok) throw new Error('無法讀取資料庫');
            const csvText = await response.text();
            const lines = parseCSV(csvText);
            rawData = lines.slice(1);
            document.getElementById('status').style.display = 'none';
            applyFilter();
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = '讀取失敗，請確認網路連線';
        }
    }

    function switchTab(index) {
        currentTabIndex = index;
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
        document.querySelectorAll('.filter-row').forEach((s, i) => s.classList.toggle('active', i === index));
        applyFilter();
    }

    function sortData(displayColIdx) {
        const csvIdx = displayIndices[displayColIdx];
        if (sortConfig.column === csvIdx) {
            sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
        } else {
            sortConfig.column = csvIdx;
            sortConfig.direction = 'asc';
        }
        document.querySelectorAll('th').forEach((th, idx) => {
            th.classList.remove('sort-asc', 'sort-desc');
            if (idx === displayColIdx) th.classList.add(sortConfig.direction === 'asc' ? 'sort-asc' : 'sort-desc');
        });
        applyFilter();
    }

    function applyFilter() {
        const selectIds = ['select-roi', 'select-pl', 'select-cost'];
        const condition = document.getElementById(selectIds[currentTabIndex]).value;
        const filterEtf = document.getElementById('filter-etf').checked;
        const tbody = document.getElementById('table-body');
        
        let filtered = rawData.filter(row => {
            if (filterEtf && row[1] && row[1].startsWith('00')) return false;
            if (condition === 'all') return true;
            let val;
            if (currentTabIndex === 0) val = parseNumber(row[13]);
            else if (currentTabIndex === 1) val = parseNumber(row[12]);
            else val = parseNumber(row[5]);
            if (isNaN(val)) return false;
            if (condition.startsWith('>=')) return val >= parseFloat(condition.slice(2));
            if (condition.startsWith('<=')) return val <= parseFloat(condition.slice(2));
            if (condition.startsWith('>')) return val > parseFloat(condition.slice(1));
            if (condition.startsWith('<')) return val < parseFloat(condition.slice(1));
            return true;
        });

        if (sortConfig.column !== null) {
            filtered.sort((a, b) => {
                let valA = parseNumber(a[sortConfig.column]);
                let valB = parseNumber(b[sortConfig.column]);
                if (isNaN(valA) || isNaN(valB)) {
                    valA = (a[sortConfig.column] || '').toString();
                    valB = (b[sortConfig.column] || '').toString();
                    return sortConfig.direction === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                }
                return sortConfig.direction === 'asc' ? valA - valB : valB - valA;
            });
        }

        tbody.innerHTML = '';
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">沒有符合條件的資料</td></tr>';
            return;
        }

        filtered.forEach(row => {
            const tr = document.createElement('tr');
            displayIndices.forEach(idx => {
                const td = document.createElement('td');
                let cellVal = row[idx] || '--';
                if (idx === 12 || idx === 13) {
                    const num = parseNumber(cellVal);
                    if (num > 0) td.className = 'positive';
                    else if (num < 0) td.className = 'negative';
                }
                td.innerText = cellVal;
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    function parseNumber(str) {
        if (!str) return NaN;
        let clean = str.toString().replace(/[▲▼,%\s]/g, '');
        return parseFloat(clean);
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        return lines.map(line => {
            const parts = [];
            let current = '';
            let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { parts.push(current.trim()); current = ''; }
                else current += char;
            }
            parts.push(current.trim());
            return parts;
        });
    }
</script>

</body>
</html>
