<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資組合分析報告 - Balance_Now</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1, h2 { color: #2c3e50; text-align: center; }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 8px; text-align: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card .value { font-size: 24px; font-weight: bold; margin: 10px 0; color: #2980b9; }
        .card .label { color: #7f8c8d; font-size: 14px; }
        .positive { color: #27ae60 !important; }
        .negative { color: #e74c3c !important; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
        .advice { background: #ebf5fb; border-left: 5px solid #3498db; padding: 20px; border-radius: 4px; margin-top: 40px; }
        .advice h3 { margin-top: 0; color: #2980b9; }
        .advice ul { padding-left: 20px; }
        .advice li { margin-bottom: 10px; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #2c3e50; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>
    <div class="container">
        <nav style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #eee;">
            <a href="index.html" style="text-decoration: none; color: #3498db; font-weight: bold;">📊 組合分析</a>
            <a href="Stop_Loss_Search.html" style="text-decoration: none; color: #7f8c8d; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#e74c3c'" onmouseout="this.style.color='#7f8c8d'">🛡️ 停損監控</a>
            <a href="Amanda_Search.html" style="text-decoration: none; color: #7f8c8d; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#1abc9c'" onmouseout="this.style.color='#7f8c8d'">🔍 Amanda查詢</a>
            <a href="broken-line-search.html" style="text-decoration: none; color: #7f8c8d; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#10ac84'" onmouseout="this.style.color='#7f8c8d'">📈 破線查詢</a>
        </nav>
        <h1>投資組合分析報告</h1>
        <p style="text-align: center; color: #7f8c8d;">分析檔案: Balance_Now.xls</p>

        <div class="summary-cards" id="summary-cards">
            <!-- Summary cards will be injected here -->
        </div>

        <div class="charts">
            <div>
                <h2>資產配置 (前10大持股)</h2>
                <canvas id="allocationChart"></canvas>
            </div>
            <div>
                <h2>投資報酬率 (前10名)</h2>
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <div class="advice">
            <h3>💡 投資建議與分析</h3>
            <ul id="advice-list">
                <!-- Advice will be injected here -->
            </ul>
        </div>

        <h2>詳細持股清單 (前20名)</h2>
        <table id="holdings-table">
            <thead>
                <tr>
                    <th>代碼</th>
                    <th>名稱</th>
                    <th>市值</th>
                    <th>損益</th>
                    <th>報酬率</th>
                </tr>
            </thead>
            <tbody>
                <!-- Table rows will be injected here -->
            </tbody>
        </table>
    </div>

    <script>
        fetch('portfolio.json')
            .then(response => response.json())
            .then(data => {
                const summary = data.summary;
                const holdings = data.holdings;

                // Render Summary Cards
                const summaryContainer = document.getElementById('summary-cards');
                const cards = [
                    { label: '總投資成本', value: summary.total_cost.toLocaleString() + ' TWD' },
                    { label: '總市值', value: summary.total_value.toLocaleString() + ' TWD' },
                    { label: '總損益', value: summary.total_profit.toLocaleString() + ' TWD', class: summary.total_profit >= 0 ? 'positive' : 'negative' },
                    { label: '總報酬率', value: summary.total_roi.toFixed(2) + '%', class: summary.total_roi >= 0 ? 'positive' : 'negative' },
                    { label: '持股總數', value: summary.count }
                ];
                cards.forEach(c => {
                    summaryContainer.innerHTML += `
                        <div class="card">
                            <div class="label">${c.label}</div>
                            <div class="value ${c.class || ''}">${c.value}</div>
                        </div>
                    `;
                });

                // Render Advice
                const adviceList = document.getElementById('advice-list');
                const advice = [
                    `<strong>過度分散風險：</strong> 目前持股高達 ${summary.count} 檔，這對於一般投資者來說管理極為困難。過度分散會導致績效趨於平庸，且許多小額持股（幾千元）對整體財富增長的貢獻微乎其微。`,
                    `<strong>核心持股分析：</strong> 您的投資組合中有不少優質 ETF (如 00631L, 00662, 00757)，且部分績效表現亮眼。建議將資金集中在這些具備長期成長潛力的核心標的。`,
                    `<strong>清理「雜碎」部位：</strong> 建議清理掉那些市值低於總資產 0.5% 且不具備明確投資理由的小型個股或 ETF，簡化投資組合。`,
                    `<strong>債券部位檢視：</strong> 投資組合中包含多檔債券 ETF，目前可能處於小幅虧損或持平狀態。應確認這部分是為了領息、避險還是資本利得。`,
                    `<strong>簡化策略：</strong> 考慮轉換為「核心+衛星」策略，核心部位放寬基指數 ETF（如 0050 或 006208），衛星部位再配置少量績效突出的科技或高股息標的。`
                ];
                advice.forEach(a => {
                    adviceList.innerHTML += `<li>${a}</li>`;
                });

                // Charts
                const top10Value = holdings.slice(0, 10);
                
                // Allocation Chart
                new Chart(document.getElementById('allocationChart'), {
                    type: 'pie',
                    data: {
                        labels: top10Value.map(h => h.code || h.name),
                        datasets: [{
                            data: top10Value.map(h => h.market_value),
                            backgroundColor: ['#3498db', '#2ecc71', '#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#1abc9c', '#34495e', '#d35400', '#7f8c8d']
                        }]
                    }
                });

                // Performance Chart (ROI)
                const top10Performance = [...holdings].sort((a, b) => b.roi - a.roi).slice(0, 10);
                new Chart(document.getElementById('performanceChart'), {
                    type: 'bar',
                    data: {
                        labels: top10Performance.map(h => h.code || h.name),
                        datasets: [{
                            label: 'ROI (%)',
                            data: top10Performance.map(h => h.roi),
                            backgroundColor: '#27ae60'
                        }]
                    },
                    options: {
                        scales: { y: { beginAtZero: true } }
                    }
                });

                // Table
                const tableBody = document.querySelector('#holdings-table tbody');
                holdings.slice(0, 20).forEach(h => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${h.code}</td>
                            <td>${h.name}</td>
                            <td>${h.market_value.toLocaleString()}</td>
                            <td class="${h.profit >= 0 ? 'positive' : 'negative'}">${h.profit.toLocaleString()}</td>
                            <td class="${h.roi >= 0 ? 'positive' : 'negative'}">${h.roi.toFixed(2)}%</td>
                        </tr>
                    `;
                });
            });
    </script>
</body>
</html>
